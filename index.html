<script>
const CORRECT = 'lady';
function tryUnlock() {
  const val = document.getElementById('pw-input').value.trim().toLowerCase();
  if (val === CORRECT) {
    document.getElementById('lock-screen').style.display = 'none';
    document.getElementById('deck-wrapper').style.display = 'block';
    try { animateSlide(document.querySelector('.slide.active')); } catch(e) {}

    const err = document.getElementById('pw-error');
    inp.classList.remove('shake'); void inp.offsetWidth; inp.classList.add('shake');
    err.textContent = 'Incorrect access code.';
    setTimeout(() => { err.textContent = '\u00a0'; }, 2500);
  }
}
document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') tryUnlock(); });
let current = 1;
const total = 11;

for (let i = 1; i <= total; i++) { const d = document.createElement('div'); d.className = 'dot' + (i === 1 ? ' active' : ''); d.onclick = () => goToSlide(i); dotsEl.appendChild(d); }
function goToSlide(n) {
  const prev = document.querySelector('.slide.active');
  const next = document.querySelector('.slide[data-slide="' + n + '"]');
  if (prev) prev.classList.remove('active');
  if (next) { next.classList.add('active'); animateSlide(next); }
  current = n; updateNav();
}
function changeSlide(dir) { let n = current + dir; if (n < 1) n = total; if (n > total) n = 1; goToSlide(n); }
function updateNav() { document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i + 1 === current)); counterEl.textContent = current + ' / ' + total; }
document.addEventListener('keydown', e => { if (document.getElementById('lock-screen').style.display === 'none') { if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); changeSlide(1); } if (e.key === 'ArrowLeft') { e.preventDefault(); changeSlide(-1); } } });
let touchX = 0;
document.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; });
document.addEventListener('touchend', e => { const d = touchX - e.changedTouches[0].clientX; if (Math.abs(d) > 50) changeSlide(d > 0 ? 1 : -1); });
function animateSlide(slide) {
  slide.querySelectorAll('.reveal').forEach((el, i) => {
    el.style.transition = 'none'; el.style.opacity = '0'; el.style.transform = 'translateY(18px)';
    el.offsetHeight;
    const delay = i * 0.07;
    el.style.transition = 'opacity 0.35s ease ' + delay + 's, transform 0.35s ease ' + delay + 's';
    el.style.opacity = '1'; el.style.transform = 'translateY(0)';
  });
  slide.querySelectorAll('.bar-fill:not(.filled)').forEach((bar, i) => { bar.classList.add('filled'); bar.style.width = '0'; bar.style.transition = 'width 0.6s ease ' + (i * 0.1) + 's'; bar.offsetHeight; bar.style.width = bar.dataset.width + '%'; });
}
function initParticles(canvas, opts) {
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  canvas.width = canvas.offsetWidth; canvas.height = canvas.offsetHeight;
  const count = opts.count || 40;
  const interactive = opts.interactive !== false;
  let mx = -1000, my = -1000;
  const parts = Array.from({length: count}, () => ({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, vx: (Math.random() - 0.5) * 0.3, vy: (Math.random() - 0.5) * 0.3, size: Math.random() * 2 + 0.6, alpha: Math.random() * 0.3 + 0.08 }));
  if (interactive) { canvas.addEventListener('mousemove', e => { const r = canvas.getBoundingClientRect(); mx = e.clientX - r.left; my = e.clientY - r.top; }); canvas.addEventListener('mouseleave', () => { mx = -1000; my = -1000; }); }
  (function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    parts.forEach(p => {
      if (interactive) { const dx = p.x - mx, dy = p.y - my, dist = Math.sqrt(dx*dx+dy*dy); if (dist < 100) { const f = (100-dist)/100*1.5; p.vx += (dx/dist)*f*0.08; p.vy += (dy/dist)*f*0.08; } }
      p.vx *= 0.98; p.vy *= 0.98; p.x += p.vx; p.y += p.vy;
      if (p.x < 0) p.x = canvas.width; if (p.x > canvas.width) p.x = 0;
      if (p.y < 0) p.y = canvas.height; if (p.y > canvas.height) p.y = 0;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(126,232,250,' + p.alpha + ')'; ctx.fill();
    });
    requestAnimationFrame(animate);
  })();
}
function setupParticles() {
  document.querySelectorAll('.particle-canvas').forEach(c => initParticles(c, {interactive: true, count: 50}));
  document.querySelectorAll('.particle-canvas-ambient').forEach(c => initParticles(c, {interactive: false, count: 18}));
}
document.addEventListener('mousemove', e => { const s = document.querySelector('.mouse-spotlight'); if (s) s.style.background = 'radial-gradient(600px circle at ' + e.clientX + 'px ' + e.clientY + 'px, rgba(126,232,250,0.05), transparent 40%)'; });
</script>
